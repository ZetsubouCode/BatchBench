<div class="card p-4">
  <form method="post" data-tool-label="CLIP Token Check">
    <input type="hidden" name="tool" value="clip_tokens">
    <div class="row g-3">
      <div class="col-md-8">
        <label class="form-label">Dataset Folder</label>
        <div class="input-group">
          <input
            id="folder_clip_tokens"
            name="folder_clip_tokens"
            type="text"
            class="form-control"
            placeholder="D:\path\to\dataset"
            data-root-sync="1"
            data-bs-toggle="tooltip"
            data-bs-title="Root folder to scan image + paired .txt captions"
          >
          <button
            class="btn btn-outline-light btn-browse"
            type="button"
            data-target="folder_clip_tokens"
            data-bs-toggle="tooltip"
            data-bs-title="Browse folders"
          >Browse</button>
        </div>
      </div>
      <div class="col-md-4">
        <label class="form-label">Image Extensions (comma)</label>
        <input
          name="exts_clip_tokens"
          class="form-control"
          value=".jpg,.jpeg,.png,.webp"
          data-bs-toggle="tooltip"
          data-bs-title="Only images with these extensions are scanned"
        >
      </div>
      <div class="col-md-4">
        <label class="form-label">Token Limit</label>
        <input
          name="limit_clip_tokens"
          type="number"
          min="1"
          class="form-control"
          value="77"
        >
      </div>
      <div class="col-md-4">
        <label class="form-label">Top N</label>
        <input
          name="topn_clip_tokens"
          type="number"
          min="1"
          class="form-control"
          value="20"
        >
      </div>
      <div class="col-md-4">
        <label class="form-label">Mode</label>
        <select name="mode_clip_tokens" class="form-select">
          <option value="estimate" selected>estimate</option>
          <option value="exact">exact</option>
        </select>
        <div class="form-text">Exact mode needs `transformers` and a CLIP tokenizer.</div>
      </div>
      <div class="col-md-12">
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="checkbox" id="recursive_clip_tokens" name="recursive_clip_tokens" checked>
          <label class="form-check-label" for="recursive_clip_tokens">Recursive scan</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="checkbox" id="include_temp_clip_tokens" name="include_temp_clip_tokens">
          <label class="form-check-label" for="include_temp_clip_tokens">Include `_temp`</label>
        </div>
      </div>
    </div>
    <div class="mt-3">
      <button class="btn btn-primary" type="submit">Scan Tokens</button>
    </div>
  </form>
</div>
